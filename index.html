<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena Slides</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: black;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        cursor: none;
      }

      #slide {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }

      #slide img,
      #slide video {
        grid-area: 1 / 1;
        max-width: 100%;
        max-height: 100vh;
        object-fit: cover;
        display: block;
      }

      #slide.cover img,
      #slide.cover video {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="slide"></div>
    <script src="main.js"></script>
  </body>
</html>
